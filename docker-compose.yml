version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - supabase

  supabase:
    image: supabase/postgres:15.1.0.147
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: postgres
    volumes:
      - ./supabase_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql